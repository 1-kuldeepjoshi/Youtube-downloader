<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen p-4">
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-3xl font-black mb-2 text-center bg-gradient-to-r from-red-500 to-pink-500 bg-clip-text text-transparent">
            DL Fast
        </h1>
        <p class="text-center text-slate-400 text-sm mb-6">Convert YouTube videos to MP3 or MP4 instantly</p>
        
        <div class="space-y-4">
            <input type="text" id="url" placeholder="Paste YouTube link here..." 
                   class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:outline-none focus:border-red-500 text-white transition">
            
            <div class="flex gap-3">
                <button onclick="triggerDownload('mp3')" class="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded font-bold transition">
                    Get MP3 (Audio)
                </button>
                <button onclick="triggerDownload('mp4')" class="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded font-bold transition">
                    Get MP4 (Video)
                </button>
            </div>
            
            <div id="status" class="text-center text-sm font-medium text-slate-400 mt-4 hidden animate-pulse"></div>
        </div>
    </div>

    <script>
        async function triggerDownload(format) {
            const urlInput = document.getElementById('url');
            const status = document.getElementById('status');
            const url = urlInput.value.trim();

            if (!url) {
                alert('Please enter a valid YouTube URL first!');
                return;
            }

            status.classList.remove('hidden');
            status.innerText = "Connecting to server & processing conversion...";
            
            try {
                const response = await fetch('/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.error || 'Server error occurred.');
                }

                status.innerText = "Downloading file to your device...";
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = `downloaded_file.${format}`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                
                status.innerText = "Success! Finished downloading.";
                urlInput.value = ""; 
            } catch (err) {
                status.innerText = `Error: ${err.message}`;
            }
        }
    </script>
</body>
</html>
